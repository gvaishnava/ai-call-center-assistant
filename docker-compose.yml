version: '3.8'

services:
  app:
    build: .
    ports:
      - "8503:8503"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    command: streamlit run ui/streamlit_app.py --server.port 8503 --server.address 0.0.0.0

